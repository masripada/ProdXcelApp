name: masripadafuncapp

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository so the workflow can access the code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up the Node.js version required by the Azure Function
      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Install npm dependencies for the function app
      - name: Install dependencies
        run: npm install

      # Deploy the app using the Azure Functions publish profile secret
      - name: Deploy to Azure Function App
        uses: azure/functions-action@v1
        with:
          app-name: '[masripadafuncapp]'
          publish-profile: ${{ secrets.masripadafuncapp_PUBLISH_PROFILE }}
